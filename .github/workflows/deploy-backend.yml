# Deploy to Google Cloud Run on push to prod or main.
# Repo: https://github.com/syedmustafan/ai-chatbot-backend
# Secrets: GCP_PROJECT_ID, GCP_SA_KEY (see ./setup-github-deploy.sh)
# Optional: GCP_REGION, GCP_SERVICE_NAME, ALLOWED_ORIGINS
# Optional (Twilio phone): GitHub secrets PUBLIC_BASE_URL, TWILIO_AUTH_TOKEN
# Leads dashboard API: GitHub secret LEADS_API_KEY (same value as frontend VITE_LEADS_API_KEY)

name: Deploy Backend to GCP

on:
  push:
    branches:
      - prod
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          if [ -z "$GCP_PROJECT_ID" ]; then
            echo "::error::GCP_PROJECT_ID secret is not set. Run ./setup-github-deploy.sh from this repo (see DEPLOY_GCP.md)."
            exit 1
          fi
          if [ -z "$GCP_SA_KEY" ]; then
            echo "::error::GCP_SA_KEY secret is not set. Run ./setup-github-deploy.sh from this repo (see DEPLOY_GCP.md)."
            exit 1
          fi
          echo "Required secrets are set."

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        env:
          GCP_REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
          GCP_SERVICE_NAME: ${{ secrets.GCP_SERVICE_NAME || 'ai-chatbot-backend' }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS || 'https://ai-chatbot-frontend-nu.vercel.app,https://ai-chatbot-frontend.vercel.app' }}
          # Optional: Cloud SQL connection name PROJECT:REGION:INSTANCE — enables DATABASE_URL + socket
          GCLOUD_SQL_INSTANCE: ${{ secrets.GCLOUD_SQL_INSTANCE }}
          # Set to "1" or "true" to mount Secret Manager DATABASE_URL without Cloud SQL (e.g. Neon/hosted Postgres).
          MOUNT_DATABASE_URL: ${{ secrets.MOUNT_DATABASE_URL }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          LEADS_API_KEY: ${{ secrets.LEADS_API_KEY }}
        run: |
          ENV_FILE=$(mktemp)
          trap "rm -f $ENV_FILE" EXIT
          cat > "$ENV_FILE" << EOF
          DEBUG: "False"
          ALLOWED_HOSTS: "*"
          ALLOWED_ORIGINS: "$ALLOWED_ORIGINS"
          EOF
          if [ -n "${PUBLIC_BASE_URL:-}" ]; then
            printf 'PUBLIC_BASE_URL: "%s"\n' "$PUBLIC_BASE_URL" >> "$ENV_FILE"
          fi
          if [ -n "${TWILIO_AUTH_TOKEN:-}" ]; then
            printf 'TWILIO_AUTH_TOKEN: "%s"\n' "$TWILIO_AUTH_TOKEN" >> "$ENV_FILE"
          fi
          if [ -n "${LEADS_API_KEY:-}" ]; then
            E="$ENV_FILE" K="$LEADS_API_KEY" python3 -c "import json,os; p=os.environ['E']; k=os.environ['K']; open(p,'a').write('LEADS_API_KEY: '+json.dumps(k)+chr(10))"
          fi
          SECRETS="OPENAI_API_KEY=OPENAI_API_KEY:latest,SECRET_KEY=DJANGO_SECRET_KEY:latest"
          EXTRA_FLAGS=""
          USE_DB_URL=false
          if [ -n "$GCLOUD_SQL_INSTANCE" ]; then
            USE_DB_URL=true
            EXTRA_FLAGS="--add-cloudsql-instances=${GCLOUD_SQL_INSTANCE}"
            echo "Deploying with Cloud SQL instance: $GCLOUD_SQL_INSTANCE"
          elif [ "$MOUNT_DATABASE_URL" = "1" ] || [ "$MOUNT_DATABASE_URL" = "true" ]; then
            USE_DB_URL=true
            echo "Mounting DATABASE_URL from Secret Manager (no Cloud SQL attachment)."
          fi
          if [ "$USE_DB_URL" = true ]; then
            SECRETS="${SECRETS},DATABASE_URL=DATABASE_URL:latest"
          else
            echo "No managed DB: GCLOUD_SQL_INSTANCE / MOUNT_DATABASE_URL unset — SQLite on /tmp (resets per instance; not for prod)."
          fi
          gcloud run deploy "$GCP_SERVICE_NAME" \
            --source . \
            --region="$GCP_REGION" \
            --platform=managed \
            --allow-unauthenticated \
            --cpu-boost \
            --set-secrets="$SECRETS" \
            --env-vars-file="$ENV_FILE" \
            --project="$GCP_PROJECT_ID" \
            $EXTRA_FLAGS

      - name: Output service URL
        env:
          GCP_REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
          GCP_SERVICE_NAME: ${{ secrets.GCP_SERVICE_NAME || 'ai-chatbot-backend' }}
        run: |
          gcloud run services describe "$GCP_SERVICE_NAME" \
            --region="$GCP_REGION" \
            --format='value(status.url)' \
            --project="$GCP_PROJECT_ID" || true
